
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Developer Nagmani-Yadav | Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center/cover;
    display: flex;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 200px;
    background: rgba(0,0,0,0.8);
    padding: 20px;
}

.sidebar button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: black;
    border: 1px solid cyan;
    cursor: pointer;
    color: cyan;
}

/* Main */
.overlay {
    flex: 1;
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.laptop {
    width: 95%;
    max-width: 900px;
    height: 90vh;
    overflow-y: auto;
    background: rgba(0,0,0,0.7);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 40px cyan;
}

/* Profile */
.profile {
    position: relative;
    width: 150px;
    margin: auto;
    text-align: center;
}

.profile img {
    width: 130px;
    border-radius: 50%;
    border: 3px solid cyan;
}

/* 🔥 PERFECT ORBIT */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 220px;
    height: 220px;
    transform: translate(-50%, -50%);
    animation: spin 8s linear infinite;
}

/* 4 fixed positions (circle) */
.orbit img {
    position: absolute;
    width: 40px;
}

/* Top */
.orbit img:nth-child(1) {
    top: 0;
    left: 50%;
    transform: translateX(-50%);
}

/* Right */
.orbit img:nth-child(2) {
    top: 50%;
    right: 0;
    transform: translateY(-50%);
}

/* Bottom */
.orbit img:nth-child(3) {
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
}

/* Left */
.orbit img:nth-child(4) {
    top: 50%;
    left: 0;
    transform: translateY(-50%);
}

/* Rotate whole circle */
@keyframes spin {
    100% {
        transform: translate(-50%, -50%) rotate(360deg);
    }
}

/* Text */
#typing {
    margin-top: 20px;
    color: white;
    text-align: left;
}

/* Buttons */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
    background: black;
    border: 1px solid cyan;
    text-decoration: none;
    color: cyan;
}
</style>

</head>

<body>

<div class="sidebar">
    <button onclick="showPage('about')">About</button>
    <button onclick="showPage('skills')">Skills</button>
    <button onclick="showPage('contact')">Contact</button>
    <button onclick="showPage('description')">Description</button>
</div>

<div class="overlay">
<div class="laptop">

<div class="profile">

    <img src="nagmani.jpg" alt="Nagmani">

    <div class="orbit">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968267.png">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">
        <img src="https://cdn-icons-png.flaticon.com/512/732/732190.png">
    </div>

    <h2 style="color:cyan;">Developer Nagmani-Yadav</h2>

</div>

<div id="typing"></div>

</div>
</div>

<script>
function showPage(page) {

    if(page=="about"){
        document.getElementById("typing").innerHTML =
        "Hi, I’m Nagmani Yadav 👋<br>A passionate Web Developer.";
    }

    if(page=="skills"){
        document.getElementById("typing").innerHTML =
        "HTML, CSS, JavaScript, Python";
    }

    if(page=="contact"){
        document.getElementById("typing").innerHTML = `
        <a class="btn" href="tel:9204909834">Call</a>
        <a class="btn" href="https://wa.me/919204909834">WhatsApp</a>
        `;
    }

    if(page=="description"){
        document.getElementById("typing").innerHTML =
        "Front-end Developer Project Work";
    }
}
</script>

</body>
</html>
